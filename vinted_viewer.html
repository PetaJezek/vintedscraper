<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted Items Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .stat strong {
            font-size: 1.5em;
            display: block;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select, button {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #searchInput {
            flex: 1;
            min-width: 250px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .item-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(220, 53, 69, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .delete-btn:hover {
            background: rgba(220, 53, 69, 1);
            transform: scale(1.1);
        }

        .ai-score-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .item-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .item-content {
            padding: 20px;
        }

        .item-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-price {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.9em;
            color: #666;
        }

        .item-detail {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .no-items {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .no-items h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .file-upload {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .upload-label {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ Vinted Items Viewer</h1>
            <div class="stats">
                <div class="stat">
                    <span>Total Items</span>
                    <strong id="totalCount">0</strong>
                </div>
                <div class="stat">
                    <span>Displayed</span>
                    <strong id="displayedCount">0</strong>
                </div>
                <div class="stat">
                    <span>Last Updated</span>
                    <strong id="lastUpdate">Never</strong>
                </div>
            </div>
        </header>

        <div class="file-upload">
            <label for="fileInput" class="upload-label">
                📁 Load vinted_items.json
            </label>
            <input type="file" id="fileInput" accept=".json">
            <p style="margin-top: 10px; color: #666;">Select the JSON file created by the scraper</p>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search by title, brand...">
            <select id="tagFilter">
                <option value="">Filter by Tag</option>
            </select>
            <select id="sortBy">
                <option value="score">🎯 AI Score (Highest)</option>
                <option value="date">Newest First</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="title">Title A-Z</option>
            </select>
            <button onclick="clearFilters()">Clear Filters</button>
            <button onclick="saveChanges()">💾 Save & Download JSON</button>
        </div>

        <div class="grid" id="itemsGrid"></div>
    </div>

    <script>
        let allItems = [];
        let filteredItems = [];

        // Add event listeners
        document.getElementById('fileInput').addEventListener('change', loadFile);
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('tagFilter').addEventListener('change', applyFilters);
        document.getElementById('sortBy').addEventListener('change', applyFilters);

        function loadFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    allItems = JSON.parse(e.target.result);
                    filteredItems = [...allItems];
                    populateTagFilter();
                    updateStats();
                    applyFilters();
                } catch (err) {
                    alert('Error loading JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function populateTagFilter() {
            const tagFilter = document.getElementById('tagFilter');
            const tags = [...new Set(allItems.map(item => item.tag).filter(Boolean))];
            tags.sort();
            
            tagFilter.innerHTML = '<option value="">All Tags</option>';
            tags.forEach(tag => {
                const option = document.createElement('option');
                option.value = tag;
                option.textContent = tag;
                tagFilter.appendChild(option);
            });
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const selectedTag = document.getElementById('tagFilter').value;
            
            let tempItems = [...allItems];

            // 1. Filter by selected tag
            if (selectedTag) {
                tempItems = tempItems.filter(item => item.tag === selectedTag);
            }

            // 2. Filter by search query
            if (query) {
                tempItems = tempItems.filter(item => {
                    return (item.title?.toLowerCase().includes(query)) ||
                           (item.brand?.toLowerCase().includes(query)) ||
                           (item.location?.toLowerCase().includes(query)) ||
                           (item.description?.toLowerCase().includes(query));
                });
            }

            filteredItems = tempItems;
            sortAndRender();
        }

        function sortAndRender() {
            const sortBy = document.getElementById('sortBy').value;
            
            filteredItems.sort((a, b) => {
                switch(sortBy) {
                    case 'score':
                        return (b.ai_score || 0) - (a.ai_score || 0);
                    case 'date':
                        return new Date(b.scraped_at) - new Date(a.scraped_at);
                    case 'price-low':
                        return parsePrice(a.price) - parsePrice(b.price);
                    case 'price-high':
                        return parsePrice(b.price) - parsePrice(a.price);
                    case 'title':
                        return (a.title || '').localeCompare(b.title || '');
                    default:
                        return 0;
                }
            });
            
            renderItems();
        }

        function parsePrice(priceStr) {
            if (!priceStr) return 0;
            const match = priceStr.match(/[\d\s,.]+/);
            if (!match) return 0;
            return parseFloat(match[0].replace(/[\s,]/g, '').replace('.', '.'));
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            
            if (filteredItems.length === 0 && allItems.length > 0) {
                grid.innerHTML = `<div class="no-items" style="grid-column: 1/-1;"><h2>No items match your filters</h2><p>Try adjusting your search or click "Clear Filters"</p></div>`;
            } else if (allItems.length === 0) {
                 grid.innerHTML = `<div class="no-items" style="grid-column: 1/-1;"><h2>No items to display</h2><p>Please load a vinted_items.json file to begin.</p></div>`;
            } else {
                grid.innerHTML = filteredItems.map(item => `
                    <div class="item-card">
                        ${item.ai_score ? `<div class="ai-score-badge">🎯 ${item.ai_score}%</div>` : ''}
                        <button class="delete-btn" onclick="deleteItem('${item.id}', '${item.image_url}')" title="Delete Item">❌</button>
                        <a href="${item.url}" target="_blank" class="item-card-link">
                            <img class="item-image" src="${item.image_url || 'https://via.placeholder.com/300x250?text=No+Image'}" alt="${item.title || 'Item'}" onerror="this.src='https://via.placeholder.com/300x250?text=No+Image'">
                            <div class="item-content">
                                <div class="item-title">${item.title || 'No title'}</div>
                                <div class="item-price">${item.price || 'Price N/A'}</div>
                                <div class="item-details">
                                    ${item.brand ? `<div class="item-detail">🏷️ ${item.brand}</div>` : ''}
                                    ${item.tag ? `<div class="item-detail">🔖 ${item.tag}</div>` : ''}
                                    ${item.location ? `<div class="item-detail">📍 ${item.location}</div>` : ''}
                                    ${item.size ? `<div class="item-detail">📏 Size ${item.size}</div>` : ''}
                                    <div class="item-detail">🕒 ${new Date(item.scraped_at).toLocaleDateString()}</div>
                                </div>
                            </div>
                        </a>
                    </div>
                `).join('');
            }
            updateStats();
        }

        async function deleteItem(itemId, imageUrl) {
            // Extract the filename from the full image path
            const imageName = imageUrl.split('/').pop();

            // --- Send request to the backend to move the image ---
            try {
                const response = await fetch('http://127.0.0.1:5000/move_to_negative', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image_name: imageName }),
                });

                const result = await response.json();

                if (!response.ok) {
                    // If the server reported an error, show it but still remove the item visually
                    alert(`Server Error: ${result.message}`);
                } else {
                    console.log(`Successfully moved ${imageName} to negative folder.`);
                }
            } catch (error) {
                // If the server isn't running, this will fail
                console.error('Could not connect to the feedback server.', error);
                alert('Could not connect to the feedback server. Make sure it is running.');
            }
            
            // --- Remove the item from the view ---
            allItems = allItems.filter(item => item.id.toString() !== itemId.toString());
            applyFilters();
        }

        function saveChanges() {
            if (allItems.length === 0) {
                alert("There are no items to save.");
                return;
            }

            const jsonString = JSON.stringify(allItems, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vinted_items.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allItems.length;
            document.getElementById('displayedCount').textContent = filteredItems.length;
            
            if (allItems.length > 0) {
                const latestDate = new Date(Math.max(...allItems.map(i => new Date(i.scraped_at))));
                document.getElementById('lastUpdate').textContent = latestDate.toLocaleString();
            } else {
                 document.getElementById('lastUpdate').textContent = 'Never';
            }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('tagFilter').value = '';
            document.getElementById('sortBy').value = 'score';
            applyFilters();
        }

        // Initial render on page load
        renderItems();
    </script>
</body>
</html>
